name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  npm_config_audit: "false"
  npm_config_fund: "false"
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-C debuginfo=0"

jobs:
  quality:
    name: Quality gate (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Visual e2e
        run: npm run test:e2e

      - name: Tauri compile smoke
        run: npm run package:smoke

      - name: Package size report
        run: npm run package:size

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-windows
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

  cross-platform-build:
    name: Build smoke (macOS, non-blocking)
    runs-on: macos-14
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Tauri compile smoke without installers
        run: npm run ci:tauri-smoke

      - name: Package size report
        run: npm run package:size
