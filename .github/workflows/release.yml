name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  package:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      npm_config_audit: "false"
      npm_config_fund: "false"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            package-args: --bundles nsis --no-sign
            artifact-name: MailGUI233-windows
          - os: macos-latest
            package-args: --bundles dmg --no-sign
            artifact-name: MailGUI233-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install
        run: npm ci --prefer-offline

      - name: Package and publish desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: MailGUI233 ${{ github.ref_name }}
          releaseBody: Small Tauri desktop build for MailGUI233.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.package-args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
